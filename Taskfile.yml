version: "3"

env:
  # Подавляет warnings для MacOS
  CGO_LDFLAGS: "-O2 -g -Wl,-w -Wl,-no_warn_duplicate_libraries"

tasks:
  default:
    # Эта задача выполняется по умолчанию при вызове 'task' без аргументов.
    # Она скрыта из списка, так как у нее нет 'desc'.
    cmds:
      - task --list
      - echo "task <name> --summary"
    silent: true

  mod:
    desc: "Sync go.mod"
    cmds:
      - go mod download
      - go mod tidy

  gqlgen:
    desc: "Regenerate gqlgen files"
    cmds:
      - go run github.com/99designs/gqlgen generate

  mock:
    desc: "Regenerate mocks"
    cmds:
      - go generate -run mockery ./...

  # mock:
  #   desc: "Generate mocks (via mockery v3)"
  #   cmds:
  #     - go run github.com/vektra/mockery/v3@latest

  lint:
    desc: "Run linters"
    summary: |
      Run linters.
    cmds:
      - ../level85/scripts/lint.sh
    silent: true

  run:
    desc: "Run server"
    cmds:
      - go run cmd/server/main.go

  kill-port:
    desc: "Kill specific port"
    summary: |
      Kill specific port.

      EXAMPLE:
        task kill-port -- 7171
    cmds:
      - lsof -ti:{{.CLI_ARGS}} | xargs kill -9

  bench:
    desc: "Run all benchmarks"
    cmds:
      - go test -bench=. -run=^$ ./test/

  bench-mem:
    desc: "Run all benchmarks with memory profiling"
    cmds:
      - go test -bench=. -run=^$ -benchmem ./test/

  test:
    desc: "Run all tests"
    cmds:
      - go test -race -failfast -count=1 -p 8 ./...

  test-v:
    desc: "Run all tests with verbose output"
    cmds:
      - go test -v -race -failfast -count=1 -p 8 ./...

  test-short:
    desc: "Run short tests"
    cmds:
      - go test -v -race -short -failfast -count=1 -p 8 ./...

  test-smoke:
    desc: "Run smoke tests"
    cmds:
      - go test -tags smoke -v -race -failfast -count=1 ./test/smoke/

  test-e2e:
    desc: "Run e2e tests"
    cmds:
      - go test -tags e2e -v -race -failfast -count=1 ./test/smoke/

  cover:
    desc: "Run coverage"
    summary: |
      Run coverage.
    cmds:
      - ../level85/scripts/cover.sh
      - ../level85/scripts/after-cover.sh

  agents:
    desc: "Setup Agents"
    status:
      - "[ \"$(basename $PWD)\" = \"level85\" ]"
    cmds:
      - "[ \"$(readlink .agents)\" = \"../level85/.agents\" ] || ln -sf
        ../level85/.agents .agents"
      - ln -sf ../level85/AGENTS.md AGENTS.md

  agents-claude:
    desc: "Setup Agents for Claude"
    deps: [ agents ]
    cmds:
      - "[ \"$(readlink .claude)\" = \".agents\" ] || ln -sf .agents .claude"
      - echo '@AGENTS.md' > CLAUDE.md

  bdd:
    desc: "Run all BDD scenarios"
    cmd: go test -tags bdd -count=1 -p 8 -timeout 20m ./test/bdd/steps/...

  bdd-pending:
    desc: "Show pending (unimplemented) steps"
    cmd: go test -tags bdd -failfast -count=1 -p 8 ./test/bdd/steps/
      -godog.format=pretty 2>&1 | grep -i pending
